# Server
server.port=${PORT:8080}

# ?? MySQL Database ??????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/expenseiqdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=springstudent
spring.datasource.password=springstudent
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ?????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'validate' is safest for production ? schema managed by SQL scripts below
# Use 'update' during initial dev if you want Hibernate to auto-create columns
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? JWT ??????????????????????????????????????????????????????????????????????
# Use a long random string (256-bit+) in production
app.jwt.secret=c2VjcmV0S2V5Rm9yRXhwZW5zZVRyYWNrZXJBcHBsaWNhdGlvbjIwMjRTZWN1cmVLZXk=
app.jwt.expiration-ms=86400000

# ?? CORS ?????????????????????????????????????????????????????????????????????
app.cors.allowed-origins=http://localhost:3000